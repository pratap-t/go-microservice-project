apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailer-service
  template:
    metadata:
      labels:
        app: mailer-service
    spec:
      containers:
        - name: mailer-service
          image: "tripuraripratap/mailer-service:latest"
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
            env:
              - name: Mail_DOMAIN
                value: "example.com"
              - name: MAILHOG_HOST
                value: "mailhog"
              - name: MAILHOG_SMTP_PORT
                value: "1025"
              - name: MAILHOG_WEB_PORT
                value: "8025"
              - name: MAIL_ENCRYPTION
                value: none
              - name: MAIL_USERNAME
                value: ""
              - name: MAIL_PASSWORD
                value: ""
              - name: FROM_NAME
                value: "Mailer Service"
              - name: FROM_ADDRESS
                value: "john.smith@abc.com"
            ports:
              - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: mailer-service
spec:
  selector:
    app: mailer-service
  ports:
    - protocol: TCP
      name: main-port
      port: 80
      targetPort: 80